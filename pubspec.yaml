name: mini_merchant_pos_flutter
description: "Mini Merchant POS - Offline POS with Role-Based Access Control"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.9.2
  sqflite: ^2.4.2+1
  path: ^1.9.1
  shared_preferences: ^2.5.5
  go_router: ^14.8.1
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
